<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTAL DRIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #04000d; overflow: hidden; cursor: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #title {
    position: fixed; top: 1.8rem; left: 2rem;
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem); letter-spacing: 0.15em;
    color: #00fff7; pointer-events: none; z-index: 10;
    text-shadow: 0 0 20px rgba(0,255,247,0.6);
  }
  #sub {
    position: fixed; top: calc(1.8rem + clamp(1.2rem,2.5vw,1.8rem) + 6px); left: 2rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
    letter-spacing: 0.3em; color: #bf5fff; pointer-events: none; z-index: 10; text-transform: uppercase;
  }
  #hint {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace; font-size: 0.55rem;
    letter-spacing: 0.3em; color: rgba(191,95,255,0.35);
    pointer-events: none; z-index: 10; text-transform: uppercase; white-space: nowrap;
  }
  #dot { position: fixed; width: 8px; height: 8px; border-radius: 50%; background: #ff2d78; pointer-events: none; z-index: 100; transform: translate(-50%,-50%); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">FRACTAL DRIFT</div>
<div id="sub">fractal field · move to interact</div>
<div id="hint">move your cursor to grow fractals</div>
<div id="dot"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const dot = document.getElementById('dot');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

const mouse = { x: -999, y: -999 };
let mouseVel = 0, prevX = 0, prevY = 0;
window.addEventListener('mousemove', e => {
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  mouseVel = Math.min(Math.sqrt(dx*dx + dy*dy), 30);
  prevX = mouse.x = e.clientX;
  prevY = mouse.y = e.clientY;
  dot.style.left = e.clientX + 'px';
  dot.style.top = e.clientY + 'px';
});

const COLORS = ['#ff2d78','#00fff7','#bf5fff','#ffcc00','#00ffaa','#ff6b35'];
const COUNT = 150;
let particles = [];

function mkP() {
  const a = Math.random() * Math.PI * 2;
  const s = Math.random() * 0.6 + 0.15;
  return {
    x: Math.random() * W, y: Math.random() * H,
    vx: Math.cos(a) * s, vy: Math.sin(a) * s,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    size: Math.random() * 1.6 + 0.5,
    trail: [], trailLen: Math.floor(Math.random() * 10) + 4,
    life: Math.random(), maxLife: 0.6 + Math.random() * 0.4
  };
}
function initParticles() { particles = Array.from({ length: COUNT }, mkP); }
initParticles();

let trees = [], frame = 0, burstCooldown = 0;

function buildBranches(x, y, angle, depth, len, color, out) {
  if (depth === 0 || len < 1.5) return;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  out.push({ x1: x, y1: y, x2, y2, depth, color, progress: 0 });
  const spread = 0.3 + Math.random() * 0.25;
  buildBranches(x2, y2, angle - spread, depth-1, len*0.68, color, out);
  buildBranches(x2, y2, angle + spread, depth-1, len*0.68, color, out);
  if (depth > 2 && Math.random() < 0.4)
    buildBranches(x2, y2, angle + (Math.random()-0.5)*0.5, depth-1, len*0.55, color, out);
}

function spawnFractalBurst(x, y, color) {
  const numTrees = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numTrees; i++) {
    const angle = (i / numTrees) * Math.PI * 2 + Math.random() * 0.4;
    const branches = [];
    buildBranches(x, y, angle, 5, 28 + Math.random() * 18, color, branches);
    trees.push({ branches, life: 1, color });
  }
}

function flowAngle(x, y, t) {
  return (Math.sin(x*0.007+t*0.22) + Math.cos(y*0.007+t*0.18)) * Math.PI;
}

function draw() {
  frame++;
  const t = frame * 0.011;
  ctx.fillStyle = 'rgba(4,0,13,0.2)';
  ctx.fillRect(0, 0, W, H);

  const mR = 110 + Math.min(mouseVel*3.5, 130);
  burstCooldown--;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const fa = flowAngle(p.x, p.y, t);
    p.vx += Math.cos(fa)*0.009; p.vy += Math.sin(fa)*0.009;
    const dx = mouse.x-p.x, dy = mouse.y-p.y;
    const dist = Math.sqrt(dx*dx+dy*dy)+1;
    if (dist < mR) {
      const force = (1-dist/mR)*0.45;
      const dir = mouseVel > 5 ? -1 : 1;
      p.vx += (dx/dist)*force*dir; p.vy += (dy/dist)*force*dir;
      if (burstCooldown < 0 && Math.random() < 0.004) {
        spawnFractalBurst(p.x, p.y, p.color);
        burstCooldown = 25;
      }
    }
    p.vx *= 0.976; p.vy *= 0.976;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > p.trailLen) p.trail.shift();
    p.x += p.vx; p.y += p.vy; p.life += 0.004;
    if (p.x<-30||p.x>W+30||p.y<-30||p.y>H+30||p.life>p.maxLife) { particles[i]=mkP(); continue; }
    if (p.trail.length > 1) {
      ctx.beginPath(); ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let j=1; j<p.trail.length; j++) ctx.lineTo(p.trail[j].x, p.trail[j].y);
      ctx.strokeStyle=p.color; ctx.lineWidth=p.size*0.35; ctx.globalAlpha=0.18; ctx.stroke();
    }
    ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill(); ctx.globalAlpha=1;
  }

  ctx.lineWidth=0.3;
  for (let i=0; i<particles.length; i+=2) {
    for (let j=i+2; j<particles.length; j+=2) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const d2=dx*dx+dy*dy;
      if (d2<4800) {
        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=particles[i].color; ctx.globalAlpha=(1-d2/4800)*0.15; ctx.stroke(); ctx.globalAlpha=1;
      }
    }
  }

  for (let t2=trees.length-1; t2>=0; t2--) {
    const tree=trees[t2];
    tree.life -= 0.008;
    if (tree.life<=0) { trees.splice(t2,1); continue; }
    for (let b=0; b<tree.branches.length; b++) {
      const br=tree.branches[b];
      br.progress=Math.min(1, br.progress+0.06);
      if (br.progress<=0) continue;
      const ex=br.x1+(br.x2-br.x1)*br.progress;
      const ey=br.y1+(br.y2-br.y1)*br.progress;
      ctx.beginPath(); ctx.moveTo(br.x1,br.y1); ctx.lineTo(ex,ey);
      ctx.strokeStyle=tree.color;
      ctx.lineWidth=Math.max(0.4,(br.depth/5)*1.4);
      ctx.globalAlpha=Math.min(tree.life*(br.depth/6)*0.85, 0.9);
      ctx.stroke(); ctx.globalAlpha=1;
    }
  }
  if (trees.length>40) trees.splice(0, trees.length-40);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
