<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOUNCE & BLOOM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0a0f; overflow: hidden; cursor: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #hint {
    position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 0.55rem;
    letter-spacing: 0.3em; color: rgba(255,255,255,0.2);
    pointer-events: none; z-index: 10; white-space: nowrap; text-transform: uppercase;
  }
  #dot {
    position: fixed; width: 6px; height: 6px; border-radius: 50%;
    background: #fff; pointer-events: none; z-index: 100;
    transform: translate(-50%,-50%); opacity: 0.7;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">move to trail fractals · particles bounce & explode</div>
<div id="dot"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const dot = document.getElementById('dot');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const COLORS = [
  '#FF3F8E','#FF9A3C','#FFE93C','#3CFFA0','#3CC4FF','#C03CFF','#FF3C3C','#3CFFEA',
];

const mouse = { x: -999, y: -999 };
let mouseVel = 0, prevMX = 0, prevMY = 0, mouseActive = false, mouseTimer = null;

window.addEventListener('mousemove', e => {
  const dx = e.clientX - prevMX, dy = e.clientY - prevMY;
  mouseVel = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
  prevMX = mouse.x = e.clientX;
  prevMY = mouse.y = e.clientY;
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
  mouseActive = true;
  clearTimeout(mouseTimer);
  mouseTimer = setTimeout(() => { mouseActive = false; }, 80);
  if (mouseVel > 2) spawnFractalTrail(e.clientX, e.clientY);
});

// ── PARTICLES ──────────────────────────────────────────────────────
// Change PCOUNT to add/remove particles
const PCOUNT = 55;

// mkParticle: r = radius (size). Change the numbers after * to make bigger/smaller
// Currently: min size = 3, max size = 8  ← CHANGE THESE
function mkParticle() {
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const r = 3 + Math.random() * 5;        // ← SIZE: change 3 (min) and 5 (range)
  const speed = 1.5 + Math.random() * 2.5;
  const angle = Math.random() * Math.PI * 2;
  return {
    x: r + Math.random() * (W - r*2),
    y: r + Math.random() * (H - r*2),
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r, color,
    gravity: 0.04 + Math.random() * 0.04
  };
}

let particles = [];
function initParticles() { particles = Array.from({ length: PCOUNT }, mkParticle); }
initParticles();

// ── FIREWORK SPARKS ────────────────────────────────────────────────
let sparks = [];

function spawnFirework(x, y, color1, color2) {
  const count = 10 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
    const speed = 1.5 + Math.random() * 3.5;
    sparks.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
      size: 1.5 + Math.random() * 2,
      color: Math.random() < 0.5 ? color1 : color2,
      trail: []
    });
  }
  rings.push({ x, y, r: 0, maxR: 28 + Math.random()*12, life: 1, color: color1 });
}

let rings = [];

// ── FRACTAL TRAILS ─────────────────────────────────────────────────
// duration: how long each trail lasts in ms. Currently 2000 = 2 seconds ← CHANGE THIS
// While mouse is actively moving, new trails connect to the last ones (ramificacion)

let fractalTrails = [];
let trailCooldown = 0;
let lastTrailTip = null; // tracks the last trail endpoint for chaining

function buildBranch(x, y, angle, depth, len, out) {
  if (depth === 0 || len < 2) return;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  out.push({ x1: x, y1: y, x2, y2, depth });
  const spread = 0.35 + Math.random() * 0.2;
  buildBranch(x2, y2, angle - spread, depth-1, len * 0.65, out);
  buildBranch(x2, y2, angle + spread, depth-1, len * 0.65, out);
  // extra branch when mouse is fast = denser ramification
  if (mouseVel > 8 && depth > 1 && Math.random() < 0.5) {
    buildBranch(x2, y2, angle + (Math.random()-0.5)*0.6, depth-1, len*0.55, out);
  }
  // return tip for chaining
  return { x: x2, y: y2 };
}

function spawnFractalTrail(x, y) {
  trailCooldown--;
  if (trailCooldown > 0) return;
  // faster mouse = more frequent trails
  trailCooldown = mouseVel > 10 ? 2 : 5;

  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const branches = [];

  // if mouse is actively moving fast, chain from last trail tip (ramification!)
  let originX = x, originY = y;
  if (mouseActive && mouseVel > 6 && lastTrailTip) {
    // grow FROM the previous tip — fractals connect into each other
    originX = lastTrailTip.x;
    originY = lastTrailTip.y;
  }

  const arms = mouseVel > 12 ? 4 : 2; // more arms when moving fast
  let tip = null;
  for (let i = 0; i < arms; i++) {
    const angle = Math.random() * Math.PI * 2;
    // depth grows with mouse speed: slow = 3, fast = 5
    const depth = mouseVel > 15 ? 5 : mouseVel > 8 ? 4 : 3;
    const len = 14 + Math.random() * 12;
    const t = buildBranch(originX, originY, angle, depth, len, branches);
    if (t) tip = t;
  }

  // remember tip for next trail to chain from
  lastTrailTip = tip || { x, y };

  fractalTrails.push({
    branches,
    color,
    born: performance.now(),
    duration: 2000   // ← FADE DURATION in ms. Change 2000 to adjust seconds (1000 = 1s)
  });

  if (fractalTrails.length > 40) fractalTrails.shift();
}

// ── COLLISION ──────────────────────────────────────────────────────
let collisionCooldowns = new Set();

function checkCollisions() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = particles[i].r + particles[j].r;
      if (dist < minDist && dist > 0) {
        const nx = dx/dist, ny = dy/dist;
        const dvx = particles[i].vx - particles[j].vx;
        const dvy = particles[i].vy - particles[j].vy;
        const dot2 = dvx*nx + dvy*ny;
        if (dot2 < 0) {
          particles[i].vx -= dot2*nx; particles[i].vy -= dot2*ny;
          particles[j].vx += dot2*nx; particles[j].vy += dot2*ny;
        }
        const overlap = minDist - dist;
        particles[i].x += nx*overlap*0.5; particles[i].y += ny*overlap*0.5;
        particles[j].x -= nx*overlap*0.5; particles[j].y -= ny*overlap*0.5;
        const key = i+'-'+j;
        if (!collisionCooldowns.has(key)) {
          spawnFirework(
            (particles[i].x+particles[j].x)*0.5,
            (particles[i].y+particles[j].y)*0.5,
            particles[i].color, particles[j].color
          );
          collisionCooldowns.add(key);
          setTimeout(() => collisionCooldowns.delete(key), 400);
        }
      }
    }
  }
}

function pushParticles() {
  const mR = 90 + mouseVel * 2;
  for (let i = 0; i < particles.length; i++) {
    const dx = particles[i].x - mouse.x;
    const dy = particles[i].y - mouse.y;
    const dist = Math.sqrt(dx*dx+dy*dy)+1;
    if (dist < mR) {
      const force = (1 - dist/mR) * 0.9;
      particles[i].vx += (dx/dist)*force*1.5;
      particles[i].vy += (dy/dist)*force*1.5;
    }
  }
}

// ── DRAW LOOP ──────────────────────────────────────────────────────
const MAX_SPEED = 7;

function draw() {
  ctx.fillStyle = 'rgba(10,10,15,0.28)';
  ctx.fillRect(0, 0, W, H);

  const now = performance.now();

  // draw fractal trails
  for (let t = fractalTrails.length-1; t >= 0; t--) {
    const trail = fractalTrails[t];
    const age = (now - trail.born) / trail.duration;
    if (age >= 1) { fractalTrails.splice(t, 1); continue; }
    const alpha = age < 0.1 ? age/0.1 : 1 - ((age-0.1)/0.9);
    for (let b = 0; b < trail.branches.length; b++) {
      const br = trail.branches[b];
      ctx.beginPath();
      ctx.moveTo(br.x1, br.y1);
      ctx.lineTo(br.x2, br.y2);
      ctx.strokeStyle = trail.color;
      ctx.lineWidth = Math.max(0.3, (br.depth/4)*1.0);
      ctx.globalAlpha = alpha * (br.depth/4) * 0.7;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // draw sparks
  for (let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.trail.push({ x: s.x, y: s.y });
    if (s.trail.length > 5) s.trail.shift();
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.06; s.vx *= 0.97; s.vy *= 0.97;
    s.life -= s.decay;
    if (s.life <= 0) { sparks.splice(i,1); continue; }
    if (s.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(s.trail[0].x, s.trail[0].y);
      for (let k = 1; k < s.trail.length; k++) ctx.lineTo(s.trail[k].x, s.trail[k].y);
      ctx.strokeStyle = s.color; ctx.lineWidth = s.size*0.4;
      ctx.globalAlpha = s.life*0.4; ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size*s.life, 0, Math.PI*2);
    ctx.fillStyle = s.color; ctx.globalAlpha = s.life*0.9; ctx.fill();
    ctx.globalAlpha = 1;
  }

  // draw rings
  for (let i = rings.length-1; i >= 0; i--) {
    const rg = rings[i];
    rg.r += 2.5; rg.life -= 0.055;
    if (rg.life <= 0) { rings.splice(i,1); continue; }
    ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI*2);
    ctx.strokeStyle = rg.color; ctx.lineWidth = 0.8;
    ctx.globalAlpha = rg.life*0.6; ctx.stroke(); ctx.globalAlpha = 1;
  }

  // update & draw particles
  pushParticles();
  checkCollisions();

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.vy += p.gravity * 0.08;
    const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if (spd > MAX_SPEED) { p.vx=(p.vx/spd)*MAX_SPEED; p.vy=(p.vy/spd)*MAX_SPEED; }
    p.x += p.vx; p.y += p.vy;
    if (p.x-p.r<0)  { p.x=p.r;   p.vx=Math.abs(p.vx)*0.85;  spawnFirework(p.x,p.y,p.color,COLORS[Math.floor(Math.random()*COLORS.length)]); }
    if (p.x+p.r>W)  { p.x=W-p.r; p.vx=-Math.abs(p.vx)*0.85; spawnFirework(p.x,p.y,p.color,COLORS[Math.floor(Math.random()*COLORS.length)]); }
    if (p.y-p.r<0)  { p.y=p.r;   p.vy=Math.abs(p.vy)*0.85;  spawnFirework(p.x,p.y,p.color,COLORS[Math.floor(Math.random()*COLORS.length)]); }
    if (p.y+p.r>H)  { p.y=H-p.r; p.vy=-Math.abs(p.vy)*0.85; spawnFirework(p.x,p.y,p.color,COLORS[Math.floor(Math.random()*COLORS.length)]); }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.globalAlpha = 0.92; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x-p.r*0.28, p.y-p.r*0.28, p.r*0.22, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.globalAlpha = 0.55; ctx.fill();
    ctx.globalAlpha = 1;
  }

  mouseVel *= 0.85;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
